<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hedge Finder" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Hedge Finder</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --text: #f0f0f0; --text2: #888; --text3: #555;
      --blue: #4da3ff; --green: #3ecf8e; --red: #f87171;
      --radius: 12px; --radius-sm: 8px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { max-width: 480px; margin: 0 auto; padding: 56px 20px 40px; }
    .header { margin-bottom: 28px; }
    .header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
    .header p { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .search-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .ticker-input { flex: 1; font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; padding: 0 16px; height: 48px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); outline: none; -webkit-appearance: none; }
    .ticker-input::placeholder { color: var(--text3); letter-spacing: 0.5px; }
    .ticker-input:focus { border-color: var(--blue); }
    .run-btn { height: 48px; padding: 0 20px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .run-btn:active { background: var(--bg3); }
    .run-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .status-bar { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; min-height: 20px; margin-bottom: 20px; padding-left: 2px; }
    .error-msg { font-size: 13px; color: var(--red); background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 16px; line-height: 1.5; }
    .metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
    .metric-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 12px; border: 1px solid var(--border); }
    .metric-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .metric-value { font-size: 20px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .metric-value.pos { color: var(--green); }
    .metric-value.neg { color: var(--red); }
    .metric-value.neu { color: var(--text); }
    .section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 10px; }
    .hedges-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    .hedge-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .sector-badge { display: inline-block; font-size: 9px; padding: 2px 7px; border-radius: 99px; background: rgba(77,163,255,0.12); color: var(--blue); margin-bottom: 8px; font-weight: 500; }
    .hedge-ticker { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .hedge-name { font-size: 10px; color: var(--text2); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hedge-stats { display: flex; gap: 14px; }
    .hedge-stat-label { font-size: 9px; color: var(--text3); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
    .hedge-stat-val { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .c-red { color: var(--red); }
    .c-green { color: var(--green); }
    .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 24px; }
    .legend { display: flex; gap: 16px; margin-bottom: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
    .legend-line { width: 18px; height: 2px; border-radius: 1px; }
    .legend-line.dashed { background: repeating-linear-gradient(90deg, #555 0, #555 4px, transparent 4px, transparent 7px); }
    .disclaimer { font-size: 10px; color: var(--text3); line-height: 1.6; padding-top: 16px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Hedge Finder</h1>
      <p>Enter a tech stock to find inversely correlated hedges across defensive sectors</p>
    </div>
    <div class="search-row">
      <input class="ticker-input" id="tickerInput" type="text" placeholder="NVDA" maxlength="6" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="run-btn" id="runBtn" onclick="runAnalysis()">Analyze</button>
    </div>
    <div class="status-bar" id="statusBar">Enter a ticker to get started</div>
    <div id="errorMsg"></div>
    <div id="metricsSection" style="display:none">
      <div class="metrics-row" id="metricsRow"></div>
      <p class="section-label">Top hedge candidates</p>
      <div class="hedges-grid" id="hedgesGrid"></div>
      <div class="chart-wrap">
        <p class="section-label" style="margin-bottom:10px">30-day normalized return</p>
        <div class="legend" id="chartLegend"></div>
        <div style="position:relative;height:180px">
          <canvas id="priceChart" role="img" aria-label="30-day price comparison"></canvas>
        </div>
      </div>
      <p class="disclaimer">Beta and correlation calculated from 30 days of Yahoo Finance data. For informational purposes only. Not financial advice.</p>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const HEDGES = [
      { ticker:'WM',  name:'Waste Management',    sector:'Waste' },
      { ticker:'ED',  name:'Con Edison',           sector:'Utilities' },
      { ticker:'MCD', name:"McDonald's",           sector:'Staples' },
      { ticker:'KO',  name:'Coca-Cola',            sector:'Staples' },
      { ticker:'GLD', name:'SPDR Gold ETF',        sector:'Commodities' },
      { ticker:'VZ',  name:'Verizon',              sector:'Telecom' },
      { ticker:'PG',  name:'Procter & Gamble',     sector:'Staples' },
      { ticker:'JNJ', name:'Johnson & Johnson',    sector:'Healthcare' },
      { ticker:'XLU', name:'Utilities ETF',        sector:'Utilities' },
      { ticker:'XLP', name:'Consumer Staples ETF', sector:'Staples' },
      { ticker:'XLV', name:'Healthcare ETF',       sector:'Healthcare' },
      { ticker:'TLT', name:'20yr Treasury ETF',    sector:'Bonds' },
    ];

    let priceChart = null;

    function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }
    function setError(msg) {
      document.getElementById('errorMsg').innerHTML = msg ? '<div class="error-msg">'+msg+'</div>' : '';
    }

    async function fetchPrices(ticker) {
      const res = await fetch('/api/quote?ticker=' + encodeURIComponent(ticker));
      if (!res.ok) throw new Error('Could not fetch ' + ticker + ' (HTTP ' + res.status + ')');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const closes = data && data.chart && data.chart.result && data.chart.result[0] && data.chart.result[0].indicators && data.chart.result[0].indicators.quote && data.chart.result[0].indicators.quote[0] && data.chart.result[0].indicators.quote[0].close;
      if (!closes || closes.length < 10) throw new Error('No price data for ' + ticker + ' - check the ticker symbol');
      return closes.filter(function(x) { return x !== null && x !== undefined; });
    }

    function calcReturns(prices) {
      var r = [];
      for (var i = 1; i < prices.length; i++) r.push((prices[i] - prices[i-1]) / prices[i-1]);
      return r;
    }

    function calcBeta(stockRet, spyRet) {
      var n = Math.min(stockRet.length, spyRet.length);
      var sr = stockRet.slice(0,n), mr = spyRet.slice(0,n);
      var meanS = sr.reduce(function(a,b){return a+b;},0)/n;
      var meanM = mr.reduce(function(a,b){return a+b;},0)/n;
      var cov = 0, varM = 0;
      for (var i=0;i<n;i++){cov+=(sr[i]-meanS)*(mr[i]-meanM);varM+=(mr[i]-meanM)*(mr[i]-meanM);}
      return varM===0?0:cov/varM;
    }

    function calcCorr(a, b) {
      var n = Math.min(a.length, b.length);
      var x = a.slice(0,n), y = b.slice(0,n);
      var mx = x.reduce(function(a,b){return a+b;},0)/n;
      var my = y.reduce(function(a,b){return a+b;},0)/n;
      var num=0,dx=0,dy=0;
      for(var i=0;i<n;i++){num+=(x[i]-mx)*(y[i]-my);dx+=(x[i]-mx)*(x[i]-mx);dy+=(y[i]-my)*(y[i]-my);}
      return dx===0||dy===0?0:num/Math.sqrt(dx*dy);
    }

    function normalize(prices) {
      var base = prices[0];
      return prices.map(function(p){return ((p-base)/base)*100;});
    }

    async function runAnalysis() {
      var ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
      if (!ticker) return;
      var btn = document.getElementById('runBtn');
      btn.disabled = true;
      document.getElementById('metricsSection').style.display = 'none';
      setError('');

      try {
        setStatus('Fetching price data...');
        var results = await Promise.all([fetchPrices(ticker), fetchPrices('SPY')]);
        var stockPrices = results[0], spyPrices = results[1];

        setStatus('Calculating beta & correlation...');
        var stockRet = calcReturns(stockPrices);
        var spyRet = calcReturns(spyPrices);
        var beta = calcBeta(stockRet, spyRet);
        var corrSpy = calcCorr(stockRet, spyRet);

        document.getElementById('metricsRow').innerHTML =
          '<div class="metric-card"><div class="metric-label">Beta</div><div class="metric-value '+(beta>1.2?'neg':beta<0.6?'pos':'neu')+'">'+beta.toFixed(2)+'</div></div>' +
          '<div class="metric-card"><div class="metric-label">Corr / SPY</div><div class="metric-value '+(corrSpy>0.5?'neg':corrSpy<0?'pos':'neu')+'">'+corrSpy.toFixed(2)+'</div></div>' +
          '<div class="metric-card"><div class="metric-label">Days</div><div class="metric-value neu">'+stockPrices.length+'</div></div>';

        setStatus('Scoring hedge candidates...');
        var hedgeResults = await Promise.allSettled(
          HEDGES.map(function(h){ return fetchPrices(h.ticker).then(function(p){ return Object.assign({},h,{prices:p}); }); })
        );

        var scored = [];
        hedgeResults.forEach(function(r) {
          if (r.status !== 'fulfilled') return;
          var hd = r.value;
          var hRet = calcReturns(hd.prices);
          scored.push(Object.assign({},hd,{corr:calcCorr(stockRet,hRet),beta:calcBeta(hRet,spyRet)}));
        });
        scored.sort(function(a,b){return a.corr-b.corr;});
        var top = scored.slice(0,6);

        document.getElementById('hedgesGrid').innerHTML = top.map(function(h){
          return '<div class="hedge-card">' +
            '<div class="sector-badge">'+h.sector+'</div>' +
            '<div class="hedge-ticker">'+h.ticker+'</div>' +
            '<div class="hedge-name">'+h.name+'</div>' +
            '<div class="hedge-stats">' +
              '<div><div class="hedge-stat-label">Corr</div><div class="hedge-stat-val '+(h.corr<0?'c-red':'c-green')+'">'+h.corr.toFixed(2)+'</div></div>' +
              '<div><div class="hedge-stat-label">Beta</div><div class="hedge-stat-val '+(h.beta<0.5?'c-green':'')+'">'+h.beta.toFixed(2)+'</div></div>' +
            '</div></div>';
        }).join('');

        setStatus('Drawing chart...');
        var normStock = normalize(stockPrices);
        var normSpy = normalize(spyPrices.slice(0, stockPrices.length));
        var labels = normStock.map(function(_,i){return i+1;});

        document.getElementById('chartLegend').innerHTML =
          '<div class="legend-item"><div class="legend-line" style="background:#4da3ff"></div>'+ticker+'</div>' +
          '<div class="legend-item"><div class="legend-line dashed"></div>SPY</div>';

        if (priceChart) priceChart.destroy();
        priceChart = new Chart(document.getElementById('priceChart'), {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { label: ticker, data: normStock, borderColor: '#4da3ff', borderWidth: 2, pointRadius: 0, tension: 0.3 },
              { label: 'SPY', data: normSpy, borderColor: '#555', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, tension: 0.3 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx){ return ctx.dataset.label+': '+ctx.parsed.y.toFixed(2)+'%'; } } } },
            scales: { x: { display: false }, y: { ticks: { callback: function(v){ return v.toFixed(1)+'%'; }, font: { size: 10 }, color: '#555' }, grid: { color: 'rgba(255,255,255,0.04)' } } }
          }
        });

        document.getElementById('metricsSection').style.display = 'block';
        setStatus(ticker + ' - analysis complete');

      } catch(e) {
        setError('Could not fetch data: ' + e.message);
        setStatus('');
      }
      btn.disabled = false;
    }

    document.getElementById('tickerInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') runAnalysis();
    });
  </script>
</body>
</html>
